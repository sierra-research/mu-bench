name: Deploy Leaderboard

on:
  push:
    branches:
      - main
    paths:
      - "leaderboard/**"
      - "results/leaderboard.json"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: leaderboard
        run: npm ci

      - name: Inject leaderboard data
        run: node leaderboard/scripts/inject-data.js

      - name: Build
        working-directory: leaderboard
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_PAGES_BASE: /mubench/

      - name: Assemble site
        run: |
          mkdir -p site/mubench
          cp -r leaderboard/dist/* site/mubench/
          echo "research.sierra.ai" > site/CNAME
          cat > site/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=/mubench/" /></head>
            <body><a href="/mubench/">Redirecting to mubench...</a></body>
          </html>
          REDIRECT

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
