name: Post-Merge Score

on:
  pull_request_target:
    types: [closed]
    paths:
      - "submissions/raw/**"

permissions:
  contents: write

concurrency:
  group: post-merge-score
  cancel-in-progress: false

jobs:
  score-and-commit:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: scoring
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Detect and validate submission directory name
        id: detect
        run: |
          MERGE_SHA=${{ github.event.pull_request.merge_commit_sha }}
          echo "Merge commit: $MERGE_SHA"
          CHANGED_FILES=$(git diff --name-only "${MERGE_SHA}^1" "${MERGE_SHA}" -- submissions/raw/)
          DIRS=$(echo "$CHANGED_FILES" | sed 's|^\(submissions/raw/[^/]*\)/.*|\1|' | sort -u)
          if [ -z "$DIRS" ]; then
            echo "No submission directory detected"
            exit 1
          fi
          DIR_COUNT=$(echo "$DIRS" | wc -l | tr -d ' ')
          if [ "$DIR_COUNT" -gt 1 ]; then
            echo "ERROR: Multiple submission directories detected. PRs should contain exactly one submission."
            echo "$DIRS"
            exit 1
          fi
          SUBMISSION_DIR=$(echo "$DIRS" | head -1)
          SUBMISSION_NAME=$(basename "$SUBMISSION_DIR")
          if ! echo "$SUBMISSION_NAME" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "ERROR: Submission directory name contains disallowed characters: $SUBMISSION_NAME"
            exit 1
          fi
          echo "dir=$SUBMISSION_DIR" >> "$GITHUB_OUTPUT"
          echo "name=$SUBMISSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Detected submission: $SUBMISSION_DIR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[scoring]

      - name: Validate submission
        run: python scoring/validate.py "${{ steps.detect.outputs.dir }}" --manifest manifest.json

      - name: Inject scoring prompts
        env:
          SCORING_PROMPTS_PY: ${{ secrets.SCORING_PROMPTS_PY }}
        run: |
          if [ -z "$SCORING_PROMPTS_PY" ]; then
            echo "ERROR: SCORING_PROMPTS_PY secret is not set"
            exit 1
          fi
          printenv SCORING_PROMPTS_PY > scoring/prompts.py

      # Rebuild the canonical gold cache (submissions/normalized/_gold/) if
      # the manifest gold hash has changed. Idempotent — a no-op when the
      # cache already matches. See scoring/normalize_gold.py.
      - name: Refresh canonical gold cache
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Pinned judge config — keep synchronized across providers.
          SCORING_MODEL: gpt-4.1-2025-04-14
          SCORING_TEMPERATURE: "0.0"
          SCORING_SEED: "7"
        run: python -m scoring.normalize_gold --manifest manifest.json

      # Reuse normalized output from the preceding /score run(s) on this PR.
      # The restore-keys prefix matches any cache written under the same
      # submission name + PR number, so a merge commit inherits the last
      # /score result and only re-normalizes files whose raw content changed.
      - name: Restore normalized cache
        uses: actions/cache@v4
        with:
          path: submissions/normalized/${{ steps.detect.outputs.name }}
          key: normalize-v1-${{ steps.detect.outputs.name }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.merge_commit_sha }}
          restore-keys: |
            normalize-v1-${{ steps.detect.outputs.name }}-${{ github.event.pull_request.number }}-

      - name: Invalidate stale normalized files
        run: |
          python scripts/invalidate_normalized_cache.py invalidate \
            --submission-dir "${{ steps.detect.outputs.dir }}" \
            --normalized-dir "submissions/normalized/${{ steps.detect.outputs.name }}" \
            --judge-model gpt-4.1-2025-04-14 \
            --judge-temperature 0.0 \
            --judge-seed 7 \
            --manifest-gold-hash-file submissions/normalized/_gold/manifest_gold_hash.txt

      - name: Normalize submissions
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCORING_MODEL: gpt-4.1-2025-04-14
          SCORING_TEMPERATURE: "0.0"
          SCORING_SEED: "7"
        run: |
          python -m scoring.normalize \
            --submission-dir "${{ steps.detect.outputs.dir }}" \
            --manifest manifest.json \
            --output-dir "submissions/normalized/${{ steps.detect.outputs.name }}" \
            --num-workers 25

      - name: Update normalized cache metadata
        run: |
          python scripts/invalidate_normalized_cache.py update \
            --submission-dir "${{ steps.detect.outputs.dir }}" \
            --normalized-dir "submissions/normalized/${{ steps.detect.outputs.name }}" \
            --judge-model gpt-4.1-2025-04-14 \
            --judge-temperature 0.0 \
            --judge-seed 7 \
            --manifest-gold-hash-file submissions/normalized/_gold/manifest_gold_hash.txt

      - name: Calculate metrics
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCORING_MODEL: gpt-4.1-2025-04-14
          SCORING_TEMPERATURE: "0.0"
          SCORING_SEED: "7"
        run: |
          python -m scoring.score \
            --submission-dir "${{ steps.detect.outputs.dir }}" \
            --normalized-dir "submissions/normalized/${{ steps.detect.outputs.name }}" \
            --manifest manifest.json \
            --output-dir "results/${{ steps.detect.outputs.name }}" \
            --num-workers 25

      - name: Merge latency statistics into scores.json
        run: |
          python scripts/latency_stats.py \
            --submission-dir "${{ steps.detect.outputs.dir }}" \
            --manifest manifest.json \
            --output-dir "results/${{ steps.detect.outputs.name }}"

      - name: Check judge-config consistency across providers
        run: python scripts/check_judge_drift.py --results-dir results

      - name: Update leaderboard.json
        run: python -m scoring.update_leaderboard

      - name: Commit results to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit canonical gold cache too — it's a per-repo artifact and
          # its hash feeds scores.json cache invalidation.
          git add results/ submissions/normalized/
          git diff --cached --quiet || git commit -m "Add scoring results for ${{ steps.detect.outputs.name }}"
          git push
