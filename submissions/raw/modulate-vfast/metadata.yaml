model: velma-2-stt-batch-english-vfast
organization: Modulate
version: vfast
date: "2026-07-02"
config:
  beamSize: default
  languageHint: en-US
  customVocabulary: default
  noiseSuppression: default
  domainAdaptation: default
  keywordBoosting: default
notes: |
  English-only batch STT endpoint (velma-2-stt-batch-english-vfast).
  override: languageHint — endpoint is English-specific; language is fixed
  to en-US by endpoint selection rather than auto-detected. No custom
  vocabulary, domain adaptation, keyword boosting, or noise suppression
  was used; all other inference settings are provider defaults.
  Latency: endpoint hosted in AWS us-east-1; measured at concurrency=1,
  request-to-response round-trip, from a client external to AWS (developer
  workstation), so p95 includes public-internet RTT and is a conservative
  upper bound on in-region latency.
